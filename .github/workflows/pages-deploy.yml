name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # submodules: true
          # If using the 'assets' git submodule from Chirpy Starter, uncomment above
          # (See: https://github.com/cotes2020/chirpy-starter/tree/main/assets)

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Test site
        run: |
          bundle exec htmlproofer _site \
            \-\-disable-external \
            \-\-ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      - name: Encrypt password-protected posts
        env:
          STATICRYPT_PASSWORD: ${{ secrets.POST_PASSWORD }}
        run: |
          base="_site${{ steps.pages.outputs.base_path }}"
          list="$base/staticrypt-targets.txt"
          targets=$(grep -v '^[[:space:]]*$' "$list" 2>/dev/null || true)
          if [ -z "$targets" ]; then
            echo "No posts marked 'encrypted: true'; skipping encryption."
            rm -f "$list"
            exit 0
          fi
          if [ -z "$STATICRYPT_PASSWORD" ]; then
            echo "::error::Found posts marked 'encrypted: true' but the POST_PASSWORD secret is not set."
            exit 1
          fi
          npm install -g staticrypt
          echo "$targets" | while IFS= read -r url; do
            url=$(echo "$url" | tr -d '[:space:]')
            [ -z "$url" ] && continue
            file="${base}${url}index.html"
            if [ -f "$file" ]; then
              echo "Encrypting $file"
              staticrypt "$file" -d "$(dirname "$file")" --short -t tools/staticrypt-prompt-template.html
            else
              echo "::warning::Encrypted target not found: $file"
            fi
          done
          rm -f "$list"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
